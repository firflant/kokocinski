$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Content
status: stable
group: Sections
description: Universal centered content container. Renders as <main> for page content or <section> for page sections, with optional background tint and top border.
props:
  type: object
  properties:
    container:
      type: string
      title: Container width
      description: Choose narrow (max-w-4xl) for content pages or normal (max-w-7xl) for wider layouts.
      enum:
        - normal
        - narrow
      default: normal
    tag:
      type: string
      title: HTML tag
      description: Outer wrapper element — main for page content, section for page sections.
      enum:
        - main
        - section
      default: main
    padding:
      type: string
      title: Vertical padding
      enum:
        - compact
        - normal
        - spacious
      default: normal
    background:
      type: string
      title: Background
      description: Optional background — primary is a dark translucent tint; white is solid white; light is a soft vertical gradient (primary-50 → primary-100) for subtle depth on article-style layouts.
      enum:
        - none
        - primary
        - white
        - light
      default: none
    border:
      type: boolean
      title: Top border
      description: When true, renders a subtle top border — slate on white/light backgrounds, translucent white on dark/none.
      default: false
    id:
      type: string
      title: ID
      description: Optional HTML id attribute for the outer wrapper element.
slots:
  children:
    title: Children
    description: Nested content rendered inside the centered container.
